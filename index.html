  thead tr { border-bottom: 2px solid #e5e7eb; text-align: left; }
  th { padding: 6px 8px; color: #666; font-weight: 600; }
  td { padding: 8px; }

  .location { color: #666; }
  .right { text-align: right; }
  .bold { font-weight: 600; }
  .footer { font-size: 11px; color: #999; text-align: center; margin-top: 12px; }
  .dist-label { font-size: 12px; color: #555; }

</style>

<div class="container">

      <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div> Low Priority</div>
    </div>
  </div>

  <div class="chart-card">
    <canvas id="chart"></canvas>
  </div>
  <div id="tooltip"></div>

  <p class="footer" id="footerText"></p>
</div>

let maxDist = 500;
let stageFilter = "all";
let chart;

function getScore(d, m) {
  const ds = 1 - Math.min(d, maxDist) / maxDist;
  const ms = (m - 20) / 50;
  return ds * 0.5 + ms * 0.5;
}
function getColor(s) { return s >= 0.6 ? "#16a34a" : s >= 0.45 ? "#2563eb" : s >= 0.35 ? "#f59e0b" : "#dc2626"; }
function getPriorityLabel(s) { return s >= 0.6 ? "High Priority" : s >= 0.45 ? "Medium-High" : s >= 0.35 ? "Medium-Low" : "Low Priority"; }

function filtered() {
  return RAW_DATA
    .filter(d => d.distance <= maxDist)
    .filter(d => stageFilter === "all" || d.stage === stageFilter)
    .map(d => ({ ...d, score: getScore(d.distance, d.margin), radius: Math.max(3, Math.min(18, Math.sqrt(d.amount / 5000))) }));
}

function buildChart() {
  const data = filtered();
  const avg_d = data.reduce((s,d) => s+d.distance, 0) / (data.length||1);
  const avg_m = data.reduce((s,d) => s+d.margin, 0) / (data.length||1);

  const datasets = [{
    data: data.map(d => ({ x: d.distance, y: d.margin, r: d.radius, ...d })),
    backgroundColor: data.map(d => getColor(d.score) + "bb"),
    borderColor: data.map(d => getColor(d.score)),
    borderWidth: 1,
  }];

  if (chart) chart.destroy();
  chart = new Chart(document.getElementById("chart"), {
    type: "bubble",
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false, external: externalTooltip },
        annotation: undefined
      },
      scales: {
        x: { title: { display: true, text: "Distance from Chesapeake, VA (miles)", font: { size: 12 } }, min: 0, max: maxDist, grid: { color: "#f0f0f0" } },
        y: { title: { display: true, text: "Proposed Profit %", font: { size: 12 } }, min: 20, max: 70, grid: { color: "#f0f0f0" } }
      },
      onHover: (e, elements) => { e.native.target.style.cursor = elements.length ? "pointer" : "default"; }
    },
    plugins: [{
      id: "avgLines",
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        ctx.save();
        ctx.setLineDash([5, 5]);
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 1;
        const xp = x.getPixelForValue(avg_d);
        ctx.beginPath(); ctx.moveTo(xp, y.top); ctx.lineTo(xp, y.bottom); ctx.stroke();
        const yp = y.getPixelForValue(avg_m);
        ctx.beginPath(); ctx.moveTo(x.left, yp); ctx.lineTo(x.right, yp); ctx.stroke();
        ctx.restore();
      }
    }]
  });

  // Top table
  const top = [...data].sort((a,b) => b.score - a.score).slice(0, 10);
  document.getElementById("topTable").innerHTML = top.map((j, i) =>
    `<tr><td class="rank">${i+1}</td><td class="project-name" title="${j.name}">${j.name}</td><td class="location">${j.city}, ${j.state}</td><td class="right">${j.distance} mi</td><td class="right bold">${j.margin.toFixed(1)}%</td><td class="right">$${j.amount.toLocaleString()}</td><td class="right location">${j.stage}</td></tr>`
  ).join("");

  document.getElementById("footerText").textContent = `Dashed lines = averages (${avg_d.toFixed(0)} mi, ${avg_m.toFixed(1)}% margin). Showing ${data.length} bids.`;
}

function externalTooltip(context) {
  const tt = document.getElementById("tooltip");
  if (context.tooltip.opacity === 0) { tt.style.display = "none"; return; }
  const d = context.tooltip.dataPoints?.[0]?.raw;
  if (!d) return;
  const score = getScore(d.distance, d.margin);
  tt.innerHTML = `
    <div class="tt-name">${d.name}</div>
    <div class="tt-loc">${d.city}, ${d.state} &mdash; ${d.stage}</div>
    <div class="tt-grid">
      <div><span>Distance:</span> <strong>${d.distance} mi</strong></div>
      <div><span>Margin:</span> <strong>${d.margin.toFixed(1)}%</strong></div>
      <div><span>Amount:</span> <strong>$${d.amount.toLocaleString()}</strong></div>
      <div><span>Priority:</span> <strong style="color:${getColor(score)}">${getPriorityLabel(score)}</strong></div>
    </div>`;
  tt.style.display = "block";
  const rect = context.chart.canvas.getBoundingClientRect();
  tt.style.left = (rect.left + window.scrollX + context.tooltip.caretX + 12) + "px";
  tt.style.top = (rect.top + window.scrollY + context.tooltip.caretY - 12) + "px";
}

// Stage filter options
const stages = [...new Set(RAW_DATA.map(d => d.stage))];
const sel = document.getElementById("stageFilter");
stages.forEach(s => { const o = document.createElement("option"); o.value = s; o.textContent = s; sel.appendChild(o); });
sel.addEventListener("change", e => { stageFilter = e.target.value; buildChart(); });

document.getElementById("distSlider").addEventListener("input", e => {
  maxDist = +e.target.value;
  document.getElementById("distLabel").textContent = maxDist;
  buildChart();
});

buildChart();
</script>
